<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="web.css" />
  <title>Student Registration</title>
</head>
<body>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#path">Learning Path</a></li>
      <li><a href="index.html#resources">Resources</a></li>
      <li><a href="form.html">Register</a></li>
    </ul>
  </nav>

  <h1>Student Registration</h1>
  <p>Fill in the form below and we will send you a personalised study plan.</p>

  <hr />

  <form >

    <label for="name">Full Name:</label><br />
    <input type="text" id="name" name="name" placeholder="Enter your full name" required /><br /><br />

    <label for="email">Email Address:</label><br />
    <input type="email" id="email" name="email" placeholder="Enter your email" required /><br /><br />

    <label for="level">Your Current Level:</label><br />
    <select id="level" name="level">
      <option value="beginner">Beginner — I know nothing yet</option>
      <option value="some">I know a little HTML/CSS</option>
      <option value="intermediate">Intermediate — I can build basic pages</option>
    </select><br /><br />

    <label for="gender">Gender:</label><br />
    <select id="gender" name="gender">
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select><br /><br />

    <label for="goal">What do you want to learn?</label><br />
    <textarea id="goal" name="goal" rows="4" cols="40" placeholder="e.g. I want to build my own website, or I want to get a job in web design..."></textarea><br /><br />

    <input type="submit" value="Register" />
    <input type="reset" value="Clear" />

  </form>

  <hr />

  <p><a href="index.html">Back to Home</a></p>

</body>
</html>
