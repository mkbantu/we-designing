<!DOCTYPE html>
<head>
  <title>Contact Form</title>
</head>
<body>

  <h1>Contact Us</h1>
  <p>Please fill in the form below and we will get back to you.</p>

  <hr />

  <form a>

    <label for="name">Full Name:</label><br />
    <input type="text" name="name" placeholder="Enter your full name" required /><br />

    <label for="email">Email Address:</label><br />
    <input type="email"  name="email" placeholder="Enter your email" required /><br />

    <label for="phone">Phone Number:</label><br />
    <input type="tel"  name="phone" placeholder="Enter your phone number" /><br />

    <label for="subject">Subject:</label><br />
    <input type="text"  name="subject" placeholder="Enter the subject" /><br />

    <label for="message">Message:</label><br />
    <textarea id="message" name="message" rows="5" cols="40" placeholder="Write your message here..." required></textarea><br /><br />

    <label for="gender">Gender:</label><br />
    <select id="gender" name="gender">
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select><br />

    <input type="submit" />
    <input type="reset"/>

  </form>

  <hr />

  <p><a href="index.html">Back to Home</a></p>

</body>
</html>
